services:
  api:
    build: .
    container_name: fraud-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env

  streamlit:
    build: .
    container_name: fraud-streamlit
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api